# Meeting Agent Configuration

# STT Model Selection
# openai-whisper models: tiny, base, small, medium, large, turbo
# tiny  ~39M params  - fastest, runs on any device
# base  ~74M params  - good balance for low-end hardware
# small ~244M params - better accuracy, still CPU-friendly
# turbo ~809M params - best accuracy
stt:
  model: "tiny"   # Default: runs on any device
  language: null  # null for auto-detect, or specify: en, es, fr, etc.
  word_timestamps: false  # Set true for word-level timestamps (slower)

# Speaker Diarization
diarization:
  enabled: true
  min_speakers: null  # null for auto-detect
  max_speakers: null

# LLM Provider
llm:
  provider: "ollama"        # Options: ollama, anthropic, openai
  model: "granite4:350m"    # Local model — no API key needed
  temperature: 0.3
  max_tokens: 4000

# API Keys (or use environment variables)
api_keys:
  anthropic: ${ANTHROPIC_API_KEY}
  openai: ${OPENAI_API_KEY}
  huggingface: ${HF_TOKEN}  # Required for pyannote

# Storage
storage:
  database: "sqlite:///meetings.db"
  
# Integrations
integrations:
  notion:
    enabled: false
    token: ${NOTION_TOKEN}
    database_id: ${NOTION_DATABASE_ID}
  
  obsidian:
    enabled: false
    vault_path: "~/Documents/Obsidian/Meetings"
  
  email:
    enabled: true
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_APP_PASSWORD}
    from_address: ${EMAIL_FROM}

# Processing
processing:
  audio_sample_rate: 16000
  audio_channels: 1
  vad_threshold: 0.5
  
# Background Tasks
celery:
  broker_url: "redis://localhost:6379/0"
  result_backend: "redis://localhost:6379/0"

# API Server
api:
  host: "0.0.0.0"
  port: 8000
  reload: false
